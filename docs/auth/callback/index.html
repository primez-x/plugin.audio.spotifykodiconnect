<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spotify Kodi Auth</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #121212;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #1DB954;
            border-top: 4px solid transparent;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #ff6b6b;
            margin: 20px 0;
        }
        .info {
            color: #1DB954;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Connecting to Kodi...</h2>
    <div class="spinner"></div>
    <p id="status">Redirecting to your Kodi device...</p>
</div>

<script>
(function() {
    // Extract code, state from URL parameters
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');

    const statusEl = document.getElementById('status');

    if (!code) {
        statusEl.className = 'error';
        statusEl.textContent = 'Error: No authorization code received from Spotify. Please try again.';
        return;
    }

    if (!state) {
        statusEl.className = 'error';
        statusEl.textContent = 'Error: No state parameter. Please try again from Kodi.';
        return;
    }

    try {
        // State format: <csrf>|<kodi_host>
        // Extract Kodi host from state
        const parts = state.split('|');
        const csrf = parts[0];
        const kodiHost = parts.length > 1 ? parts[1] : null;

        if (!kodiHost) {
            statusEl.className = 'error';
            statusEl.textContent = 'Error: Could not determine Kodi device. Please try again.';
            return;
        }

        // Redirect to Kodi device's /auth/complete endpoint
        // Pass code and csrf (not full state with host)
        const redirectUrl = `http://${kodiHost}/auth/complete?code=${encodeURIComponent(code)}&state=${encodeURIComponent(csrf)}`;

        statusEl.className = 'info';
        statusEl.textContent = `Connecting to ${kodiHost}...`;

        // Perform the redirect
        window.location.href = redirectUrl;

    } catch (e) {
        statusEl.className = 'error';
        statusEl.textContent = `Error parsing authentication data: ${e.message}`;
    }
})();
</script>
</body>
</html>
